<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quantis</title>

    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/input.css">
    <link rel="stylesheet" href="css/codeblock.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="sidebar-top">

            <button id="newChatBtn" class="new-chat">

                <span class="icon-holder"></span>

                <span>New Chat</span>

            </button>

        </div>

        <div class="chat-history">

        </div>

        <div class="sidebar-bottom">

            <button id="settingsBtn" class="settings-btn">

                <span class="icon-holder"></span>

                <span>Settings</span>

                </button>

            </button>

        </div>

    </aside>


    <main class="main">

        <header class="topbar">

            <div class="brand-small">

                <!-- Logo goes here later -->
                <span class="brand-name">Quantis</span>

            </div>

        </header>


        <section id="chatArea" class="chat-area new-chat">

            <div id="hero" class="hero">

                <div class="hero-logo">

                    <!-- Your animated logo later -->

                </div>

                <h1>Quantis</h1>

                <p>
                    I can help with programming, writing,
                    brainstorming, debugging, learning,
                    and much more.
                </p>

                <div class="starter-prompts">

                    <button>Generate code</button>

                    <button>Explain something</button>

                    <button>Brainstorm ideas</button>

                    <button>Write content</button>

                </div>

            </div>


            <div id="messages"></div>

        </section>


        <footer id="inputArea" class="input-area centered">

            <textarea
                id="prompt"
                placeholder="Ask Quantis..."
                rows="1"
            ></textarea>

            <button id="send"></button>

        </footer>

    </main>
    
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
